# GitLab CI/CD: sync sessiondb-docs to GitHub public repo
# Set in GitLab: Settings → CI/CD → Variables (masked)
#   - GH_TOKEN: GitHub Personal Access Token (repo scope)
# Optional: GH_TARGET_REPO (default: sessiondb/docs)

stages:
  - sync
  - publish

variables:
  # Override in GitLab CI/CD variables if different
  GH_TARGET_REPO: "sessiondb/docs"

# --- 1. SYNC TO GITHUB (on every push to main) ---
github_sync:
  stage: sync
  image: alpine:latest
  only:
    - main
  before_script:
    - apk add --no-cache git openssh
    - git config --global user.name "GitLab CI Bot"
    - git config --global user.email "ci-bot@sessiondb.com"
  script:
    # Optional: do not push .gitlab-ci.yml to public GitHub repo
    - git checkout -b github-sync-temp
    - rm -f .gitlab-ci.yml
    - git add .
    - git commit -m "[chore] sync from GitLab [skip ci]" || echo "No changes to sync"
    - git push --force "https://x-access-token:${GH_TOKEN}@github.com/${GH_TARGET_REPO}.git" github-sync-temp:main

# --- 2. PUBLISH (on tag push: sync tag to GitHub + create release) ---
publish_release:
  stage: publish
  image: alpine:latest
  only:
    - tags
  before_script:
    - apk add --no-cache git openssh github-cli
    - git config --global user.name "GitLab CI Bot"
    - git config --global user.email "ci-bot@sessiondb.com"
    - export GITHUB_TOKEN="${GH_TOKEN}"
  script:
    # Ensure tag is pushed to GitHub so it appears in Tags
    - git push "https://x-access-token:${GH_TOKEN}@github.com/${GH_TARGET_REPO}.git" "$CI_COMMIT_TAG"
    # Create GitHub Release (prerelease; edit notes in GitHub if needed)
    - |
      gh release create "$CI_COMMIT_TAG" \
        --repo "$GH_TARGET_REPO" \
        --title "SessionDB Docs $CI_COMMIT_TAG" \
        --notes "Docs and landing site release $CI_COMMIT_TAG." \
        --prerelease
