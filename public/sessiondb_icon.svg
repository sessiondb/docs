
<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
<style>
.db { stroke:#3260e7; fill:none; stroke-width:8; stroke-linecap:round; stroke-linejoin:round;}
.clock { stroke:#dd8a3c; fill:none; stroke-width:8; stroke-linecap:round; stroke-linejoin:round;}
</style>

